<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee & Code</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Coffee & Code</h1>
    <nav class="menu">
      <button class="menu-toggle">☰</button>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#menu">Menu</a></li>
        <li><a href="#galeria">Galeria</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="home" class="hero">
      <h2>Café que inspira código</h2>
      <p>Descubra sabores únicos enquanto programa.</p>
    </section>

    <section id="menu" class="produtos">
      <h2>Cardápio</h2>
      <div class="grid">
        <article class="card">Latte</article>
        <article class="card">Espresso</article>
        <article class="card">Cappuccino</article>
        <article class="card">Mocha</article>
      </div>
    </section>

    <section id="galeria" class="galeria">
      <h2>Galeria de Fotos</h2>
      <div class="galeria-grid">
        <img src="1.jpg" alt="Café 1">
        <img src="2.jpg" alt="Café 2">
        <img src="3.jpg" alt="Café 3">
        <img src="4.jpg" alt="Café 4">
      </div>
    </section>

    <section id="blog" class="blog">
      <h2>Blog</h2>
      <p>Dicas sobre café e programação.</p>
    </section>
  </main>

  <footer id="contato">
    <p>© 2026 Coffee & Code | contato@coffeeecode.com</p>
  </footer>

</body>
</html>
